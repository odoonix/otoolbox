[pytest]
# Odoo Test Configuration for VS Code - odoonix only
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Python paths - order matters!
pythonpath =
    ./odoo/odoo
    ./

# Markers for Odoo test tags
markers =
    post_install: Post-installation tests
    at_install: Installation tests
    slow: Slow tests
    performance: Performance tests
    web: Web module tests

# Logging
log_cli = false
addopts =
    --tb=short
    -v
    -p no:cacheprovider
    -p no:python

# Suppress warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
